name: Publish TypeScript SDK

on:
  push:
    tags: ["ts-sdk-v*"]

jobs:
  publish:
    name: Build, Test & Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # version from package.json "packageManager" field

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@vectorless/shared build

      - name: Build TypeScript SDK
        run: pnpm --filter=vectorless build

      - name: Run tests
        run: pnpm --filter=vectorless test

      - name: Publish to npm
        run: cd packages/ts-sdk && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
