name: Deploy Web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/shared/**"

  # Allow manual trigger
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@vectorless/shared build

      - name: Build with next-on-pages
        working-directory: apps/web
        run: npx @cloudflare/next-on-pages
        env:
          DATABASE_URL: ${{ secrets.DASHBOARD_DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: https://vectorless.pages.dev
          NEXT_PUBLIC_APP_URL: https://vectorless.pages.dev
          VECTORLESS_API_URL: https://api.vectorless.store
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy apps/web/.vercel/output/static --project-name=vectorless
