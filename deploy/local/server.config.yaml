# Vectorless server config for local docker-compose validation.
#
# Secrets (Anthropic key) come from env vars, not from this file:
#   VLE_ANTHROPIC_API_KEY  — set in your shell before `docker compose up`
#
# This file is mounted read-only at /etc/vectorless/config.yaml inside
# the server container.

server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 120s
  drain_timeout: 15s

auth:
  # No bearer auth needed for local dev — the control-plane wraps us
  # anyway. Switch to "api_key" + set VLS_AUTH_API_KEY for prod.
  mode: "none"

metrics:
  enabled: true

tracing:
  enabled: false

rate_limit:
  enabled: false

engine:
  database:
    url: "postgres://vectorless:vectorless@postgres-server:5432/vectorless_server?sslmode=disable"
    max_conns: 10

  storage:
    driver: "s3"
    s3:
      endpoint: "http://minio:9000"
      region: "us-east-1"
      bucket: "vectorless-docs"
      access_key: "minioadmin"
      secret_key: "minioadmin"
      use_path_style: true

  queue:
    driver: "river"
    river:
      num_workers: 4

  llm:
    driver: "anthropic"
    anthropic:
      # api_key comes from VLE_ANTHROPIC_API_KEY env var.
      api_key: ""
      model: "claude-sonnet-4-20250514"

  retrieval:
    strategy: "chunked-tree"
    chunked_tree:
      max_tokens_per_call: 60000
      max_parallel_calls: 8
      include_sibling_breadcrumbs: true

  log:
    level: "debug"
    format: "console"
