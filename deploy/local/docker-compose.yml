# Full Vectorless stack — local validation.
#
# By default this pulls pre-built images from ghcr.io. Anyone with a
# GitHub account who can read public images can run:
#
#   export ANTHROPIC_API_KEY=sk-ant-...
#   docker compose up -d
#   docker compose logs -f
#
# To build the images yourself instead (forks, fresh source, debugging):
#
#   docker compose --profile build up -d --build
#
# Images / tags:
#   ghcr.io/hallelx2/vectorless-server:main           (latest main)
#   ghcr.io/hallelx2/vectorless-control-plane:main    (latest main, PRIVATE — see below)
#
# Note: the control-plane image is private. If you don't have access,
# either build locally via the `build` profile OR get an access token
# at https://github.com/settings/tokens and:
#   echo $TOKEN | docker login ghcr.io -u <user> --password-stdin

services:
  # ── Server's Postgres ──────────────────────────────────────────
  postgres-server:
    image: postgres:17-alpine
    container_name: vl-postgres-server
    environment:
      POSTGRES_USER: vectorless
      POSTGRES_PASSWORD: vectorless
      POSTGRES_DB: vectorless_server
    ports:
      - "5433:5432"
    volumes:
      - pgdata-server:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorless -d vectorless_server"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Control-plane's Postgres ───────────────────────────────────
  postgres-cp:
    image: postgres:17-alpine
    container_name: vl-postgres-cp
    environment:
      POSTGRES_USER: vectorless
      POSTGRES_PASSWORD: vectorless
      POSTGRES_DB: vectorless_control
    ports:
      - "5434:5432"
    volumes:
      - pgdata-cp:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorless -d vectorless_control"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3-compatible, stands in for R2 locally) ────────────
  minio:
    image: minio/minio:latest
    container_name: vl-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-setup:
    image: minio/mc:latest
    container_name: vl-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/vectorless-docs &&
        echo 'bucket ready'
      "

  # ── Vectorless server (embeds the engine) ──────────────────────
  # Default: pull the published image. Add --profile build to rebuild
  # locally from sibling vectorless-server/ source.
  server:
    image: ghcr.io/hallelx2/vectorless-server:main
    pull_policy: always
    container_name: vl-server
    depends_on:
      postgres-server:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    volumes:
      - ./server.config.yaml:/etc/vectorless/config.yaml:ro
    environment:
      VLE_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    command: ["--role", "server", "--config", "/etc/vectorless/config.yaml"]

  # Build override: replaces `server` when --profile build is on.
  server-build:
    profiles: ["build"]
    build:
      context: ../../..
      dockerfile: vectorless-server/Dockerfile
      args:
        VERSION: "local-compose"
    container_name: vl-server-build
    depends_on:
      postgres-server:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    ports:
      - "8081:8080"   # different port so it can run alongside the pulled image
    volumes:
      - ./server.config.yaml:/etc/vectorless/config.yaml:ro
    environment:
      VLE_ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    command: ["--role", "server", "--config", "/etc/vectorless/config.yaml"]

  # ── Vectorless control-plane ───────────────────────────────────
  control-plane:
    image: ghcr.io/hallelx2/vectorless-control-plane:main
    pull_policy: always
    container_name: vl-control-plane
    depends_on:
      postgres-cp:
        condition: service_healthy
      server:
        condition: service_started
    ports:
      - "9090:9090"
    volumes:
      - ./control-plane.config.yaml:/etc/vectorless/config.yaml:ro
    environment:
      VLC_UPSTREAM_AUTH_TOKEN: "local-dev-shared-secret-change-me"
      VLC_OAUTH_JWT_SECRET: "local-dev-jwt-secret-64-bytes-zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz"
      VLC_DASHBOARD_SERVICE_TOKEN: "local-dev-dashboard-token-change-me"
    command: ["--config", "/etc/vectorless/config.yaml"]

  control-plane-build:
    profiles: ["build"]
    build:
      context: ../../../vectorless-control-plane
      dockerfile: Dockerfile
      args:
        VERSION: "local-compose"
    container_name: vl-control-plane-build
    depends_on:
      postgres-cp:
        condition: service_healthy
    ports:
      - "9091:9090"
    volumes:
      - ./control-plane.config.yaml:/etc/vectorless/config.yaml:ro
    environment:
      VLC_UPSTREAM_AUTH_TOKEN: "local-dev-shared-secret-change-me"
      VLC_OAUTH_JWT_SECRET: "local-dev-jwt-secret-64-bytes-zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz"
      VLC_DASHBOARD_SERVICE_TOKEN: "local-dev-dashboard-token-change-me"
    command: ["--config", "/etc/vectorless/config.yaml"]

volumes:
  pgdata-server:
  pgdata-cp:
  miniodata:
