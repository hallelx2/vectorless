services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vectorless
      POSTGRES_USER: vectorless
      POSTGRES_PASSWORD: vectorless
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vectorless"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
