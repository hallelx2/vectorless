<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="rough" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.03" numOctaves="4" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e8e93"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1456f0"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="white" rx="8"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#181e25" filter="url(#rough)">How Vectorless Works</text>

  <!-- ===== TOP ROW: Traditional RAG (muted/gray) ===== -->
  <text x="400" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#8e8e93" letter-spacing="1.5" filter="url(#rough)">TRADITIONAL RAG</text>

  <!-- Strikethrough line over the label -->
  <line x1="310" y1="69" x2="490" y2="69" stroke="#8e8e93" stroke-width="1.5" opacity="0.6"/>

  <!-- RAG boxes -->
  <rect x="30" y="88" width="120" height="44" rx="10" fill="#f2f3f5" stroke="#8e8e93" stroke-width="1.5" filter="url(#rough)"/>
  <text x="90" y="115" text-anchor="middle" font-size="13" fill="#8e8e93" filter="url(#rough)">Document</text>

  <rect x="190" y="88" width="120" height="44" rx="10" fill="#f2f3f5" stroke="#8e8e93" stroke-width="1.5" filter="url(#rough)"/>
  <text x="250" y="115" text-anchor="middle" font-size="13" fill="#8e8e93" filter="url(#rough)">Chunks</text>

  <rect x="350" y="88" width="120" height="44" rx="10" fill="#f2f3f5" stroke="#8e8e93" stroke-width="1.5" filter="url(#rough)"/>
  <text x="410" y="115" text-anchor="middle" font-size="13" fill="#8e8e93" filter="url(#rough)">Vectors</text>

  <rect x="510" y="88" width="140" height="44" rx="10" fill="#f2f3f5" stroke="#8e8e93" stroke-width="1.5" filter="url(#rough)"/>
  <text x="580" y="115" text-anchor="middle" font-size="13" fill="#8e8e93" filter="url(#rough)">Similarity Search</text>

  <rect x="690" y="88" width="90" height="44" rx="10" fill="#f2f3f5" stroke="#8e8e93" stroke-width="1.5" filter="url(#rough)"/>
  <text x="735" y="115" text-anchor="middle" font-size="13" fill="#8e8e93" filter="url(#rough)">Fragments</text>

  <!-- RAG arrows -->
  <line x1="150" y1="110" x2="188" y2="110" stroke="#8e8e93" stroke-width="1.5" marker-end="url(#arrow-gray)" filter="url(#rough)"/>
  <line x1="310" y1="110" x2="348" y2="110" stroke="#8e8e93" stroke-width="1.5" marker-end="url(#arrow-gray)" filter="url(#rough)"/>
  <line x1="470" y1="110" x2="508" y2="110" stroke="#8e8e93" stroke-width="1.5" marker-end="url(#arrow-gray)" filter="url(#rough)"/>
  <line x1="650" y1="110" x2="688" y2="110" stroke="#8e8e93" stroke-width="1.5" marker-end="url(#arrow-gray)" filter="url(#rough)"/>

  <!-- Big X over RAG flow -->
  <line x1="60" y1="85" x2="755" y2="135" stroke="#8e8e93" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>
  <line x1="60" y1="135" x2="755" y2="85" stroke="#8e8e93" stroke-width="2" opacity="0.35" stroke-dasharray="6,4"/>

  <!-- Divider -->
  <line x1="40" y1="160" x2="760" y2="160" stroke="#e5e5ea" stroke-width="1"/>

  <!-- ===== BOTTOM ROW: Vectorless (highlighted) ===== -->
  <text x="400" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#1456f0" letter-spacing="1.5" filter="url(#rough)">VECTORLESS APPROACH</text>

  <!-- Vectorless boxes -->
  <rect x="18" y="212" width="128" height="52" rx="12" fill="#eef2ff" stroke="#1456f0" stroke-width="2" filter="url(#rough)"/>
  <text x="82" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#1456f0" filter="url(#rough)">Document</text>
  <text x="82" y="252" text-anchor="middle" font-size="10" fill="#1456f0" opacity="0.7" filter="url(#rough)">PDF, DOCX, MD, URL</text>

  <rect x="182" y="212" width="128" height="52" rx="12" fill="#eef2ff" stroke="#1456f0" stroke-width="2" filter="url(#rough)"/>
  <text x="246" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#1456f0" filter="url(#rough)">Structure</text>
  <text x="246" y="252" text-anchor="middle" font-size="10" fill="#1456f0" opacity="0.7" filter="url(#rough)">Extracted</text>

  <rect x="346" y="212" width="128" height="52" rx="12" fill="#fce4f3" stroke="#ea5ec1" stroke-width="2" filter="url(#rough)"/>
  <text x="410" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#ea5ec1" filter="url(#rough)">ToC Map</text>
  <text x="410" y="252" text-anchor="middle" font-size="10" fill="#ea5ec1" opacity="0.7" filter="url(#rough)">Generated</text>

  <rect x="510" y="212" width="128" height="52" rx="12" fill="#fce4f3" stroke="#ea5ec1" stroke-width="2" filter="url(#rough)"/>
  <text x="574" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#ea5ec1" filter="url(#rough)">LLM Reasons</text>
  <text x="574" y="252" text-anchor="middle" font-size="10" fill="#ea5ec1" opacity="0.7" filter="url(#rough)">Over the Map</text>

  <rect x="674" y="212" width="108" height="52" rx="12" fill="#eef2ff" stroke="#1456f0" stroke-width="2" filter="url(#rough)"/>
  <text x="728" y="234" text-anchor="middle" font-size="13" font-weight="600" fill="#1456f0" filter="url(#rough)">Complete</text>
  <text x="728" y="252" text-anchor="middle" font-size="10" fill="#1456f0" opacity="0.7" filter="url(#rough)">Sections</text>

  <!-- Vectorless arrows -->
  <line x1="146" y1="238" x2="180" y2="238" stroke="#1456f0" stroke-width="2" marker-end="url(#arrow-blue)" filter="url(#rough)"/>
  <line x1="310" y1="238" x2="344" y2="238" stroke="#1456f0" stroke-width="2" marker-end="url(#arrow-blue)" filter="url(#rough)"/>
  <line x1="474" y1="238" x2="508" y2="238" stroke="#ea5ec1" stroke-width="2" marker-end="url(#arrow-blue)" filter="url(#rough)"/>
  <line x1="638" y1="238" x2="672" y2="238" stroke="#1456f0" stroke-width="2" marker-end="url(#arrow-blue)" filter="url(#rough)"/>

  <!-- Benefit callouts -->
  <rect x="80" y="290" width="196" height="52" rx="10" fill="#f2f3f5" stroke="none" filter="url(#rough)"/>
  <text x="178" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#181e25" filter="url(#rough)">Structure Preserved</text>
  <text x="178" y="329" text-anchor="middle" font-size="10" fill="#181e25" opacity="0.6" filter="url(#rough)">Sections stay intact, never chunked</text>

  <rect x="302" y="290" width="196" height="52" rx="10" fill="#f2f3f5" stroke="none" filter="url(#rough)"/>
  <text x="400" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#181e25" filter="url(#rough)">LLM Reasoning</text>
  <text x="400" y="329" text-anchor="middle" font-size="10" fill="#181e25" opacity="0.6" filter="url(#rough)">Picks exactly what's needed</text>

  <rect x="524" y="290" width="196" height="52" rx="10" fill="#f2f3f5" stroke="none" filter="url(#rough)"/>
  <text x="622" y="313" text-anchor="middle" font-size="11" font-weight="600" fill="#181e25" filter="url(#rough)">Fully Traceable</text>
  <text x="622" y="329" text-anchor="middle" font-size="10" fill="#181e25" opacity="0.6" filter="url(#rough)">Every retrieval choice is explainable</text>

  <!-- Connecting dots from vectorless flow to benefit boxes -->
  <circle cx="178" cy="280" r="3" fill="#1456f0" opacity="0.4"/>
  <circle cx="400" cy="280" r="3" fill="#ea5ec1" opacity="0.4"/>
  <circle cx="622" cy="280" r="3" fill="#1456f0" opacity="0.4"/>

  <!-- Footer -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#181e25" opacity="0.45" filter="url(#rough)">vectorless.store</text>
</svg>